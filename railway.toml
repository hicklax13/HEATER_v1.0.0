# HEATER — Railway service config (v2 Plan 4; start.sh boot scheduler added #9).
# Single service, single volume, single replica (the scheduler is the sole SQLite
# writer — see the design spec). The startCommand runs start.sh, which launches the
# dedicated refresh scheduler at boot (so data warms without a browser session)
# then execs Streamlit. Railway runs a Dockerfile service's startCommand in exec
# form (no shell), so we invoke `sh start.sh` explicitly: start.sh reads the
# injected $PORT from the env and expands ${PORT:-8501} itself, so the server binds
# the real port and /_stcore/health passes (no literal "$PORT" footgun).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh start.sh"
healthcheckPath = "/_stcore/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
numReplicas = 1
