name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to improve the draft tool? We'd love to hear it!
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve or what would it improve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Component
      options:
        - Valuation Engine
        - Monte Carlo Simulation
        - UI/UX
        - Draft Strategy
        - Yahoo API Integration
        - Data Import
        - New Feature
    validations:
      required: true
