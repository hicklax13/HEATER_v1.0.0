name: Bug Report
description: Report a bug in the Fantasy Baseball Draft Tool
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior
      value: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Component
      options:
        - Setup Wizard
        - Draft Page
        - Hero Pick Card
        - Monte Carlo Simulation
        - Roster Diamond
        - Draft Board
        - Yahoo API Integration
        - Other
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: e.g., 3.12.1
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g., Windows 11, macOS 14
