name: Scheduled Data Refresh

on:
  schedule:
    - cron: '17 9 * * *'  # Daily at 9:17 AM UTC (off-minute to avoid load spikes)
  workflow_dispatch:  # Manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run data bootstrap
        run: python -c "from src.data_bootstrap import bootstrap_all_data; print(bootstrap_all_data(force=True))"
