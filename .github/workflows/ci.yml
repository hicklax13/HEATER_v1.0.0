name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.14.10

      - name: Run Ruff linter
        run: ruff check . --output-format=github

      - name: Run Ruff formatter check
        run: ruff format --check .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run sample data generation
        run: python load_sample_data.py

      # Structural-invariant tests (added 2026-05-10/11 during SF-15..SF-28 cleanup):
      #   test_no_hardcoded_categories_in_src.py — LeagueConfig is sole source of category lists
      #   test_pages_yahoo_compliance.py — pages use yahoo_data_service, not raw SQL
      #   test_pages_format_compliance.py — pages use format_stat for ERA/WHIP precision
      #   test_no_direct_sqlite_connect_in_scripts.py — scripts use get_connection
      #   test_refresh_log_status_validity.py — bootstrap-emitted statuses must round-trip
      #   test_app_no_hardcoded_categories.py / test_my_team_no_hardcoded_categories.py / test_sensitivity_categories_canonical.py
      #   test_my_team_uses_pool.py / test_player_compare_uses_pool.py / test_trade_analyzer_uses_pool.py
      #   test_pulp_availability_consolidation.py — single PULP_AVAILABLE source of truth
      #   test_engine_no_fallback_singletons.py — engine modules don't ship _LC singleton fallbacks
      # The pytest invocation below collects ALL tests under tests/ — these guards run automatically.
      # Do NOT replace `tests/` with explicit -k filters or test paths without re-listing these files.
      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing --cov-fail-under=60

      - name: Verify app imports cleanly
        run: python -c "import app; print('✅ app.py imports successfully')"

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify all modules import
        run: |
          python -c "from src.database import *; print('✅ database.py')"
          python -c "from src.valuation import *; print('✅ valuation.py')"
          python -c "from src.draft_state import *; print('✅ draft_state.py')"
          python -c "from src.simulation import *; print('✅ simulation.py')"
          python -c "from src.validation import *; print('✅ validation.py')"
          python -c "from src.injury_model import *; print('✅ injury_model.py')"
          python -c "from src.lineup_optimizer import *; print('✅ lineup_optimizer.py')"
          python -c "import src.engine; print('✅ src/engine')"
          python -c "from src.engine.portfolio.valuation import *; print('✅ engine/portfolio/valuation.py')"
          python -c "from src.engine.portfolio.category_analysis import *; print('✅ engine/portfolio/category_analysis.py')"
          python -c "from src.engine.portfolio.lineup_optimizer import *; print('✅ engine/portfolio/lineup_optimizer.py')"
          python -c "from src.engine.portfolio.copula import *; print('✅ engine/portfolio/copula.py')"
          python -c "from src.engine.projections.projection_client import *; print('✅ engine/projections/projection_client.py')"
          python -c "from src.engine.projections.bayesian_blend import *; print('✅ engine/projections/bayesian_blend.py')"
          python -c "from src.engine.projections.marginals import *; print('✅ engine/projections/marginals.py')"
          python -c "from src.engine.monte_carlo.trade_simulator import *; print('✅ engine/monte_carlo/trade_simulator.py')"
          python -c "from src.engine.output.trade_evaluator import *; print('✅ engine/output/trade_evaluator.py')"
          python -c "from src.engine.signals.statcast import *; print('✅ engine/signals/statcast.py')"
          python -c "from src.engine.signals.decay import *; print('✅ engine/signals/decay.py')"
          python -c "from src.engine.signals.kalman import *; print('✅ engine/signals/kalman.py')"
          python -c "from src.engine.signals.regime import *; print('✅ engine/signals/regime.py')"
          python -c "from src.engine.context.bench_value import *; print('✅ engine/context/bench_value.py')"
          python -c "from src.engine.context.concentration import *; print('✅ engine/context/concentration.py')"
          python -c "from src.engine.context.injury_process import *; print('✅ engine/context/injury_process.py')"
          python -c "from src.engine.context.matchup import *; print('✅ engine/context/matchup.py')"
          python -c "from src.engine.game_theory.opponent_valuation import *; print('✅ engine/game_theory/opponent_valuation.py')"
          python -c "from src.engine.game_theory.sensitivity import *; print('✅ engine/game_theory/sensitivity.py')"
          python -c "from src.engine.production.sim_config import *; print('✅ engine/production/sim_config.py')"
          python -c "from src.engine.production.convergence import *; print('✅ engine/production/convergence.py')"
          python -c "from src.engine.production.cache import *; print('✅ engine/production/cache.py')"
          python -c "from src.trade_value import *; print('✅ trade_value.py')"
          python -c "from src.two_start import *; print('✅ two_start.py')"
          python -c "from src.start_sit import *; print('✅ start_sit.py')"
          python -c "from src.matchup_planner import *; print('✅ matchup_planner.py')"
          python -c "from src.waiver_wire import *; print('✅ waiver_wire.py')"
          python -c "from src.trade_finder import *; print('✅ trade_finder.py')"
          python -c "from src.draft_grader import *; print('✅ draft_grader.py')"
          python -c "import app; print('✅ app.py')"

      - name: Generate sample data
        run: python load_sample_data.py

      - name: Verify database created
        run: |
          python -c "
          import sqlite3, os
          assert os.path.exists('data/draft_tool.db'), 'DB not found'
          conn = sqlite3.connect('data/draft_tool.db')
          count = conn.execute('SELECT COUNT(*) FROM projections').fetchone()[0]
          print(f'✅ Database has {count} projections')
          conn.close()
          "
