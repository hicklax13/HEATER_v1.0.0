name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

# Cancel an in-flight CI run when a new commit lands on the SAME PR.
# Intentionally NOT cancelling on master pushes (that would race
# deploy/release pipelines that may depend on the build artifact).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint & Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        # Pinned to specific patch (v8.1.0) — Astral introduced "immutable
        # secure tags" in v8.0.0 and stopped publishing bare-major tags
        # (`@v8` 404s). Latest as of 2026-05; bump deliberately to absorb
        # patches including post-CVE-2025-54368 uv binary releases.
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install ruff
        run: uv pip install --system ruff==0.14.10

      - name: Ruff linter
        run: ruff check . --output-format=github

      - name: Ruff formatter check
        run: ruff format --check .

  test:
    # Matrix sharding via pytest-split. Each group runs a duration-balanced
    # 1/4 of the suite (~2-3 min each in parallel) using pytest-xdist with
    # 2 workers per shard and `--dist loadfile` to keep per-file fixture
    # state intact (HEATER's autouse `league_standings` + `_ensure_db_schema`
    # are session-scoped; the per-worker SQLite DB redirect lives in
    # `tests/conftest.py`).
    name: Test (shard ${{ matrix.group }}/4)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v5

      # Set up Python via setup-python (puts python3.12 on PATH so
      # `uv pip install --system` and the `pytest` binary both resolve
      # correctly). `uv python install` alone installs to uv's managed
      # location but does NOT manage PATH — that mismatch was the
      # failure mode on the prior CI run.
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: requirements.txt

      # NOTE: requirements.txt deliberately omits the optional heavy extras
      # (PyMC, XGBoost). Tests behind `@pytest.mark.skipif(not PYMC_AVAILABLE)` /
      # `XGBOOST_AVAILABLE` therefore SKIP in CI — a conscious speed/footprint
      # trade-off, not an oversight. Those Bayesian/ensemble paths are verified
      # locally where the extras are installed (see CLAUDE.md "Dependencies").
      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system pytest pytest-cov

      - name: Generate sample data
        run: python load_sample_data.py

      # Structural-invariant tests (the test_no_*, test_pages_*, test_wave*
      # families enforce CLAUDE.md's ~70 invariants — categories derived from
      # LeagueConfig, pages use yahoo_data_service, scripts use get_connection,
      # PULP_AVAILABLE single-source, no _LC singletons in engine/optimizer
      # modules, etc.) get collected automatically by the broad tests/ scope.
      # Do not replace `tests/` with explicit -k filters without re-listing
      # these guards.
      - name: Run tests (sharded)
        run: |
          pytest tests/ \
            --splits 4 --group ${{ matrix.group }} \
            -n 2 --dist loadfile \
            -v --tb=short \
            --cov=src --cov-report=term-missing
        env:
          # Per-worker SQLite DB to eliminate cross-worker contention on
          # the shared `data/draft_tool.db`. Honored by
          # `src.database._resolve_db_path` (see tests/conftest.py for the
          # per-xdist-worker path scheme).
          PYTEST_XDIST_AUTO_NUM_WORKERS: "2"

  coverage-floor:
    # Coverage gate runs once (the four sharded test jobs above give partial
    # coverage each; this job re-aggregates by running the *entire* suite
    # in parallel with coverage). Kept as a separate job so the sharded
    # test jobs return fast signal; coverage gate runs in parallel and
    # only blocks merges via the `needs:` requirement on `build`.
    #
    # Runs on BOTH pull_request and push events so direct merges to
    # master/main are gated by the 60% floor (matches the pre-sharding
    # behavior where `--cov-fail-under=60` rode on every test matrix run).
    name: Coverage Floor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: requirements.txt
      - run: uv pip install --system -r requirements.txt pytest pytest-cov
      - run: python load_sample_data.py
      - run: pytest tests/ -n auto --dist loadfile --cov=src --cov-fail-under=60 --tb=short -q

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: requirements.txt

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      - name: Verify all modules import
        run: |
          python -c "from src.database import *; print('✅ database.py')"
          python -c "from src.valuation import *; print('✅ valuation.py')"
          python -c "from src.draft_state import *; print('✅ draft_state.py')"
          python -c "from src.simulation import *; print('✅ simulation.py')"
          python -c "from src.validation import *; print('✅ validation.py')"
          python -c "from src.injury_model import *; print('✅ injury_model.py')"
          python -c "from src.lineup_optimizer import *; print('✅ lineup_optimizer.py')"
          python -c "import src.engine; print('✅ src/engine')"
          python -c "from src.engine.portfolio.valuation import *; print('✅ engine/portfolio/valuation.py')"
          python -c "from src.engine.portfolio.category_analysis import *; print('✅ engine/portfolio/category_analysis.py')"
          python -c "from src.engine.portfolio.lineup_optimizer import *; print('✅ engine/portfolio/lineup_optimizer.py')"
          python -c "from src.engine.portfolio.copula import *; print('✅ engine/portfolio/copula.py')"
          python -c "from src.engine.projections.projection_client import *; print('✅ engine/projections/projection_client.py')"
          python -c "from src.engine.projections.bayesian_blend import *; print('✅ engine/projections/bayesian_blend.py')"
          python -c "from src.engine.projections.marginals import *; print('✅ engine/projections/marginals.py')"
          python -c "from src.engine.monte_carlo.trade_simulator import *; print('✅ engine/monte_carlo/trade_simulator.py')"
          python -c "from src.engine.output.trade_evaluator import *; print('✅ engine/output/trade_evaluator.py')"
          python -c "from src.engine.signals.statcast import *; print('✅ engine/signals/statcast.py')"
          python -c "from src.engine.signals.decay import *; print('✅ engine/signals/decay.py')"
          python -c "from src.engine.signals.kalman import *; print('✅ engine/signals/kalman.py')"
          python -c "from src.engine.signals.regime import *; print('✅ engine/signals/regime.py')"
          python -c "from src.engine.context.bench_value import *; print('✅ engine/context/bench_value.py')"
          python -c "from src.engine.context.concentration import *; print('✅ engine/context/concentration.py')"
          python -c "from src.engine.context.injury_process import *; print('✅ engine/context/injury_process.py')"
          python -c "from src.engine.context.matchup import *; print('✅ engine/context/matchup.py')"
          python -c "from src.engine.game_theory.opponent_valuation import *; print('✅ engine/game_theory/opponent_valuation.py')"
          python -c "from src.engine.game_theory.sensitivity import *; print('✅ engine/game_theory/sensitivity.py')"
          python -c "from src.engine.production.sim_config import *; print('✅ engine/production/sim_config.py')"
          python -c "from src.engine.production.convergence import *; print('✅ engine/production/convergence.py')"
          python -c "from src.engine.production.cache import *; print('✅ engine/production/cache.py')"
          python -c "from src.trade_value import *; print('✅ trade_value.py')"
          python -c "from src.two_start import *; print('✅ two_start.py')"
          python -c "from src.start_sit import *; print('✅ start_sit.py')"
          python -c "from src.matchup_planner import *; print('✅ matchup_planner.py')"
          python -c "from src.waiver_wire import *; print('✅ waiver_wire.py')"
          python -c "from src.trade_finder import *; print('✅ trade_finder.py')"
          python -c "from src.draft_grader import *; print('✅ draft_grader.py')"
          python -c "import app; print('✅ app.py')"

      - name: Generate sample data
        run: python load_sample_data.py

      - name: Verify database created
        run: |
          python -c "
          import sqlite3, os
          assert os.path.exists('data/draft_tool.db'), 'DB not found'
          conn = sqlite3.connect('data/draft_tool.db')
          count = conn.execute('SELECT COUNT(*) FROM projections').fetchone()[0]
          print(f'✅ Database has {count} projections')
          conn.close()
          "

  openapi-ts-sync:
    # Launch program Phase 0a guard: the committed frontend types must be
    # regenerable from api/openapi.json with no drift. openapi-typescript is
    # pinned at 7.13.0 in web/pnpm-lock.yaml (lockfileVersion 9.0 -> pnpm 9).
    name: OpenAPI → TS sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web deps
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Regenerate API types
        working-directory: web
        run: pnpm gen:api

      - name: Fail on OpenAPI/TS drift
        run: git diff --exit-code web/src/lib/api/generated.ts
