name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff linter
        run: ruff check . --output-format=github

      - name: Run Ruff formatter check
        run: ruff format --check .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run sample data generation
        run: python load_sample_data.py

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing --cov-fail-under=75

      - name: Verify app imports cleanly
        run: python -c "import app; print('✅ app.py imports successfully')"

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify all modules import
        run: |
          python -c "from src.database import *; print('✅ database.py')"
          python -c "from src.valuation import *; print('✅ valuation.py')"
          python -c "from src.draft_state import *; print('✅ draft_state.py')"
          python -c "from src.simulation import *; print('✅ simulation.py')"
          python -c "from src.validation import *; print('✅ validation.py')"
          python -c "from src.injury_model import *; print('✅ injury_model.py')"
          python -c "from src.lineup_optimizer import *; print('✅ lineup_optimizer.py')"
          python -c "import app; print('✅ app.py')"

      - name: Generate sample data
        run: python load_sample_data.py

      - name: Verify database created
        run: |
          python -c "
          import sqlite3, os
          assert os.path.exists('data/draft_tool.db'), 'DB not found'
          conn = sqlite3.connect('data/draft_tool.db')
          count = conn.execute('SELECT COUNT(*) FROM projections').fetchone()[0]
          print(f'✅ Database has {count} projections')
          conn.close()
          "
