[theme]
primaryColor = "#e63946"
backgroundColor = "#f4f5f0"
secondaryBackgroundColor = "#ffffff"
textColor = "#1d1d1f"
font = "sans serif"

[server]
headless = true
enableXsrfProtection = true
enableCORS = false

[browser]
# Silence the "running on localhost" banner on cloud deployments
gatherUsageStats = false
