[theme]
primaryColor = "#e63946"
backgroundColor = "#f4f5f0"
secondaryBackgroundColor = "#ffffff"
textColor = "#1d1d1f"
font = "sans serif"

[server]
headless = true
enableXsrfProtection = false
enableCORS = false

[browser]
# Silence the "running on localhost" banner on cloud deployments
gatherUsageStats = false

[client]
# Hide the Deploy button / toolbar chrome so the nav bar sits flush at top
toolbarMode = "minimal"
