# Fonts are ALSO locked to Inter (body) / Archivo (display) / IBM Plex Mono
# by the !important font-lock rules in src/ui_shared.py inject_custom_css().
# The fonts-by-URL values below (Streamlit >=1.47 advanced theming) align the
# native theme with that lock so pre-CSS paint + native widgets match.
[theme]
base = "light"
primaryColor = "#ff6d00"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f5f6f8"
textColor = "#1b1c20"
linkColor = "#ff6d00"
borderColor = "#e3e2de"
baseRadius = "12px"
buttonRadius = "10px"
dataframeBorderColor = "#e3e2de"
dataframeHeaderBackgroundColor = "#ffffff"
headingFontWeights = [900, 800, 800]
chartCategoricalColors = ["#ff6d00", "#ff9a3c", "#ffae42", "#1f9d6b", "#5f7d9c", "#8aa6c0", "#b0b5be", "#cdd1d8"]
font = "Inter:https://fonts.googleapis.com/css2?family=Inter:wght@400..700&display=swap"
headingFont = "Archivo:https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,500..900&display=swap"
codeFont = "'IBM Plex Mono':https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap"

[theme.sidebar]
backgroundColor = "#112744"
textColor = "#eef1f6"
borderColor = "#0c1d33"
primaryColor = "#ff6d00"

[server]
headless = true
# BUG-025: XSRF + CORS protections enabled. The app is "in-season
# production-active" per CLAUDE.md; if hosted beyond localhost, disabling
# either is exploitable (especially via Yahoo OAuth form submits). For
# local-dev quirks that genuinely need either off, override via the
# STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION / STREAMLIT_SERVER_ENABLE_CORS
# env vars at run time rather than disabling in committed config.
enableXsrfProtection = true
enableCORS = true

[browser]
# Silence the "running on localhost" banner on cloud deployments
gatherUsageStats = false

[client]
# Hide the Deploy button / toolbar chrome so the nav bar sits flush at top
toolbarMode = "minimal"
# Never render exception tracebacks in the browser. The 12-member instance is
# semi-trusted; a provider/LiteLLM error on the admin-configured SHARED AI key
# could otherwise echo request context (incl. key material) into a member's
# page. Errors still reach Railway stdout for the admin (2026-06-16 review).
showErrorDetails = "none"
